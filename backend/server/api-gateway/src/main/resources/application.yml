server:
  port: 8000

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: apigateway-service

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest

  # 💡 요청하신 ANSI 컬러 출력 설정 추가
  output:
    ansi:
      enabled: "always"

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: GlobalFilter
              args:
                baseMessage: Spring Cloud Gateway WebFlux Global Filter
                preLogger: true
                postLogger: true
          routes:
            # 1. 💡 PUBLIC ROUTE: 인증 면제 경로 (회원가입, 로그인 등)
            - id: user-service-public
              uri: lb://USER-SERVICE
              predicates:
                # 회원가입 및 로그인 경로를 명시. POST 메서드만 받도록 합니다.
                - Path=/user-service/api/users/create, /user-service/api/users/login
                - Method=POST
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/user-service/(?<segment>.*),/$\{segment}
              # AuthorizationHeaderFilter 미적용

            # 2. 💡 SECURE ROUTE: 인증 필수 경로 (나머지 모든 /user-service/**)
            - id: user-service-secure
              uri: lb://USER-SERVICE
              predicates:
                # /user-service로 시작하는 나머지 모든 경로
                - Path=/user-service/**
              filters:
                - name: AuthorizationHeaderFilter
                - RemoveRequestHeader=Cookie
                - RewritePath=/user-service/(?<segment>.*),/$\{segment}

            # 3. 그 외 다른 서비스 라우팅 규칙들
            - id: catalog-service
              uri: lb://CATALOG-SERVICE
              predicates:
                - Path=/catalog-service/**
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order-service/**
            - id: first-service
              uri: lb://MY-FIRST-SERVICE
              predicates:
                - Path=/first-service/**
              filters:
                - CustomFilter
            - id: second-service
              uri: lb://MY-SECOND-SERVICE
              predicates:
                - Path=/second-service/**
              filters:
                - name: CustomFilter
                - name: LoggingFilter
                  args:
                    baseMessage: Hi, there.
                    preLogger: true
                    postLogger: true

#token:
#  secret: my-very-long-secret-key-1234567890123456

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, beans, info, httpexchanges, busrefresh